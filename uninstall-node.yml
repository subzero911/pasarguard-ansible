---
- name: Uninstall PasarGuard Node
  hosts: pasarguard_nodes
  become: true
  vars:
    node_dir: "/opt/pasarguard-node"
    data_dir: "/var/lib/pasarguard-node"
    xray_dir: "/var/lib/pasarguard/xray-core"

  tasks:

    - name: Stop and remove PasarGuard Node containers
      shell: docker compose down --remove-orphans
      args:
        chdir: "{{ node_dir }}"
      ignore_errors: true

    - name: Remove Dozzle Agent container
      docker_container:
        name: dozzle-agent
        state: absent
      ignore_errors: true

    - name: Remove PasarGuard Node directory
      file:
        path: "{{ node_dir }}"
        state: absent

    - name: Remove PasarGuard data directory
      file:
        path: "{{ data_dir }}"
        state: absent

    - name: Remove Xray directory
      file:
        path: "{{ xray_dir }}"
        state: absent

    - name: Print uninstall summary
      debug:
        msg:
          - "══════════════════════════════════════════"
          - "PASARGUARD NODE REMOVED — {{ inventory_hostname }}"
          - "══════════════════════════════════════════"
