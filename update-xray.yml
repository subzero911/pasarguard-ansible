---
- name: Update Xray core
  hosts: marzban_nodes
  become: true
  vars:
    xray_version: "26.4.17"
    xray_dir: "/var/lib/marzban/xray-core"
    marzban_node_dir: "/opt/marzban-node"

  tasks:

    - name: Install unzip
      apt:
        name: unzip
        state: present

    - name: Create Xray directory
      file:
        path: "{{ xray_dir }}"
        state: directory
        mode: "0755"

    - name: Download Xray {{ xray_version }}
      get_url:
        url: "https://github.com/XTLS/Xray-core/releases/download/v{{ xray_version }}/Xray-linux-64.zip"
        dest: "/tmp/xray-linux-64.zip"
        force: yes

    - name: Unzip Xray
      unarchive:
        src: "/tmp/xray-linux-64.zip"
        dest: "{{ xray_dir }}"
        remote_src: yes

    - name: Set Xray executable permissions
      file:
        path: "{{ xray_dir }}/xray"
        mode: "0755"

    - name: Restart marzban-node container
      shell: docker compose down --remove-orphans && docker compose up -d
      args:
        chdir: "{{ marzban_node_dir }}"

    - name: Print result
      debug:
        msg:
          - "Xray {{ xray_version }} установлен на {{ inventory_hostname }}"
          - "Путь: {{ xray_dir }}/xray"
