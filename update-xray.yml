---
- name: Update PasarGuard Node
  hosts: pasarguard_nodes
  become: true
  vars:
    pasarguard_node_dir: "/opt/pasarguard-node"

  tasks:

    - name: Pull latest PasarGuard Node image
      shell: docker compose pull
      args:
        chdir: "{{ pasarguard_node_dir }}"

    - name: Restart PasarGuard Node
      shell: docker compose up -d
      args:
        chdir: "{{ pasarguard_node_dir }}"

    - name: Wait for container to be running
      shell: docker compose ps --format json
      args:
        chdir: "{{ pasarguard_node_dir }}"
      register: container_status
      until: "'running' in container_status.stdout"
      retries: 30
      delay: 5
      changed_when: false

    - name: Print result
      debug:
        msg:
          - "PasarGuard Node обновлен на {{ inventory_hostname }}"
