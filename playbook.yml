---
- name: Setup Marzban Node
  hosts: marzban_nodes
  become: true
  vars:
    marzban_node_dir: "/opt/marzban-node"
    marzban_data_dir: "/var/lib/marzban-node"
    service_port: 62050
    xray_api_port: 62051
    extra_inbound_port: 10443
    xray_version: "26.4.17"

  tasks:

    # ─── System ───────────────────────────────────────────────────────────────

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install base packages
      apt:
        name:
          - curl
          - socat
          - git
        state: present

    # ─── Docker ───────────────────────────────────────────────────────────────

    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    # ─── Marzban Node ─────────────────────────────────────────────────────────

    - name: Create Marzban Node directory
      file:
        path: "{{ marzban_node_dir }}"
        state: directory
        mode: "0755"

    - name: Create Marzban data directory
      file:
        path: "{{ marzban_data_dir }}"
        state: directory
        mode: "0755"

    - name: Write docker-compose.yml
      copy:
        dest: "{{ marzban_node_dir }}/docker-compose.yml"
        content: |
          services:
            marzban-node:
              image: gozargah/marzban-node:latest
              restart: always
              network_mode: host
              environment:
                SSL_CERT_FILE: "{{ marzban_data_dir }}/ssl_cert.pem"
                SSL_KEY_FILE: "{{ marzban_data_dir }}/ssl_key.pem"
                SSL_CLIENT_CERT_FILE: "{{ marzban_data_dir }}/ssl_client_cert.pem"
                SERVICE_PORT: "{{ service_port }}"
                XRAY_API_PORT: "{{ xray_api_port }}"
                SERVICE_PROTOCOL: "rest"
                XRAY_VERSION: "{{ xray_version }}"
              volumes:
                - {{ marzban_data_dir }}:{{ marzban_data_dir }}
              logging:
                driver: "json-file"
                options:
                  max-size: "10m"
                  max-file: "5"

    # ─── Generate SSL certs before starting node ──────────────────────────────

    - name: Generate SSL private key
      shell: |
        openssl req -x509 -newkey rsa:4096 -keyout {{ marzban_data_dir }}/ssl_key.pem \
          -out {{ marzban_data_dir }}/ssl_cert.pem \
          -days 3650 -nodes -subj "/CN=marzban-node"
      args:
        creates: "{{ marzban_data_dir }}/ssl_key.pem"

    - name: Write panel client certificate to node
      copy:
        dest: "{{ marzban_data_dir }}/ssl_client_cert.pem"
        content: "{{ panel_client_cert }}"
        mode: "0644"

    # ─── Start Marzban Node ──────────────────────────────

    - name: Stop and remove containers
      shell: docker compose down
      args:
        chdir: "{{ marzban_node_dir }}"
      ignore_errors: true

    - name: Start Marzban Node
      shell: docker compose up -d
      args:
        chdir: "{{ marzban_node_dir }}"

    # ─── Wait for container to be running ────────────────────────────────────

    - name: Wait for marzban-node container to be running
      shell: docker compose ps --format json marzban-node
      args:
        chdir: "{{ marzban_node_dir }}"
      register: container_status
      until: "'running' in container_status.stdout"
      retries: 30
      delay: 5
      changed_when: false

    # ─── Generate xray keys ───────────────────────────────────────────────────

    - name: Generate xray x25519 keypair
      shell: docker compose exec -T marzban-node xray x25519
      args:
        chdir: "{{ marzban_node_dir }}"
      register: xray_keypair
      changed_when: false

    - name: Generate shortId
      command: openssl rand -hex 8
      register: xray_short_id
      changed_when: false

    # ─── Dozzle Agent ─────────────────────────────────────────────────────────

    - name: Install Python requests library for docker_container module
      apt:
        name: python3-requests
        state: present

    - name: Run Dozzle Agent container
      docker_container:
        name: dozzle-agent
        image: amir20/dozzle:latest
        restart_policy: always
        command: agent
        hostname: "{{ inventory_hostname }}"
        ports:
          - "7007:7007"
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
        log_driver: json-file
        log_options:
          max-size: "10m"
          max-file: "5"

    # ─── Output ───────────────────────────────────────────────────────────────

    - name: Print setup summary
      debug:
        msg:
          - "══════════════════════════════════════════"
          - "MARZBAN NODE READY — {{ inventory_hostname }}"
          - "══════════════════════════════════════════"
          - "Node address  : {{ ansible_host }}"
          - "Service port  : {{ service_port }}"
          - "Xray API port : {{ xray_api_port }}"
          - "Inbound port  : {{ extra_inbound_port }}"
          - "══════════════════════════════════════════"
          - "xray x25519 Private key : {{ xray_keypair.stdout_lines[0] | regex_replace('^Private key: ', '') }}"
          - "xray x25519 Public key  : {{ xray_keypair.stdout_lines[1] | regex_replace('^Public key: ', '') }}"
          - "shortId                 : {{ xray_short_id.stdout }}"
          - "══════════════════════════════════════════"