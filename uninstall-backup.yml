---
- name: Удаление старой системы бэкапа PasarGuard
  hosts: pasarguard_main
  become: true

  tasks:

    # ─── Удаление cron job ─────────────────────────────────────────────────────

    - name: Удалить cron job для PasarGuard backup
      cron:
        name: "PasarGuard backup to Google Drive"
        state: absent

    # ─── Удаление скриптов ─────────────────────────────────────────────────────

    - name: Удалить скрипт бэкапа PasarGuard
      file:
        path: /usr/local/bin/backup-pasarguard.sh
        state: absent

    - name: Удалить скрипт восстановления PasarGuard
      file:
        path: /usr/local/bin/restore-pasarguard.sh
        state: absent

    # ─── Удаление logrotate ────────────────────────────────────────────────────

    - name: Удалить logrotate конфиг для PasarGuard backup
      file:
        path: /etc/logrotate.d/pasarguard-backup
        state: absent

    # ─── Удаление логов ────────────────────────────────────────────────────────

    - name: Удалить логи бэкапа PasarGuard
      file:
        path: /var/log/backup-pasarguard.log
        state: absent

    - name: Удалить логи восстановления PasarGuard
      file:
        path: /var/log/restore-pasarguard.log
        state: absent

    # ─── Инструкции ───────────────────────────────────────────────────────────

    - name: Сообщение об удалении
      debug:
        msg:
          - "══════════════════════════════════════════════════════════════"
          - "СТАРАЯ СИСТЕМА БЭКАПА PASARGUARD УДАЛЕНА"
          - "══════════════════════════════════════════════════════════════"
          - "Удалено:"
          - "  - Cron job: PasarGuard backup to Google Drive"
          - "  - Скрипт: /usr/local/bin/backup-pasarguard.sh"
          - "  - Скрипт: /usr/local/bin/restore-pasarguard.sh"
          - "  - Logrotate: /etc/logrotate.d/pasarguard-backup"
          - "  - Логи: /var/log/backup-pasarguard.log"
          - "  - Логи: /var/log/restore-pasarguard.log"
          - "══════════════════════════════════════════════════════════════"
