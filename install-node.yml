---
- name: Setup PasarGuard Node
  hosts: pasarguard_nodes
  become: true
  vars:
    pasarguard_node_dir: "/opt/pasarguard-node"
    pasarguard_data_dir: "/var/lib/pasarguard-node"
    service_port: 62050
    service_protocol: "grpc"
    api_key: "{{ pasarguard_api_key }}"

  tasks:

    # ─── System ───────────────────────────────────────────────────────────────

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install base packages
      apt:
        name:
          - curl
          - socat
          - git
        state: present

    # ─── Docker ───────────────────────────────────────────────────────────────

    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    # ─── PasarGuard Node ───────────────────────────────────────────────────────

    - name: Create PasarGuard Node directory
      file:
        path: "{{ pasarguard_node_dir }}"
        state: directory
        mode: "0755"

    - name: Create PasarGuard data directory
      file:
        path: "{{ pasarguard_data_dir }}"
        state: directory
        mode: "0755"

    - name: Download docker-compose.yml from PasarGuard repository
      get_url:
        url: "https://raw.githubusercontent.com/PasarGuard/node/refs/heads/main/docker-compose.yml"
        dest: "{{ pasarguard_node_dir }}/docker-compose.yml"
        force: yes

    - name: Create certificate directory
      file:
        path: /var/lib/pg-node/certs
        state: directory
        mode: "0755"

    - name: Generate self-signed SSL certificate
      shell: |
        openssl req -x509 -newkey rsa:4096 \
          -keyout /var/lib/pg-node/certs/ssl_key.pem \
          -out /var/lib/pg-node/certs/ssl_cert.pem \
          -days 36500 -nodes \
          -subj "/CN={{ ansible_host }}" \
          -addext "subjectAltName = DNS:{{ ansible_host }},IP:{{ ansible_default_ipv4.address }}"
      args:
        creates: /var/lib/pg-node/certs/ssl_cert.pem

    - name: Create .env file
      copy:
        dest: "{{ pasarguard_node_dir }}/.env"
        content: |
          API_KEY={{ api_key }}
          NODE_HOST=0.0.0.0
          SERVICE_PORT={{ service_port }}
          SERVICE_PROTOCOL={{ service_protocol }}
          SSL_CERT_FILE=/var/lib/pg-node/certs/ssl_cert.pem
          SSL_KEY_FILE=/var/lib/pg-node/certs/ssl_key.pem
          PG_NODE_WG_HOST_ROUTING=1
          DEBUG=false
        mode: "0600"

    # ─── Start PasarGuard Node ─────────────────────────────────────────────────

    - name: Stop and remove containers
      shell: docker compose down --remove-orphans
      args:
        chdir: "{{ pasarguard_node_dir }}"
      ignore_errors: true

    - name: Start PasarGuard Node
      shell: docker compose up -d
      args:
        chdir: "{{ pasarguard_node_dir }}"

    # ─── Wait for container to be running ────────────────────────────────────

    - name: Wait for pasarguard-node container to be running
      shell: docker compose ps --format json
      args:
        chdir: "{{ pasarguard_node_dir }}"
      register: container_status
      until: "'running' in container_status.stdout"
      retries: 30
      delay: 5
      changed_when: false

    # ─── Dozzle Agent ─────────────────────────────────────────────────────────

    - name: Install Python requests library for docker_container module
      apt:
        name: python3-requests
        state: present

    - name: Run Dozzle Agent container
      docker_container:
        name: dozzle-agent
        image: amir20/dozzle:latest
        restart_policy: always
        command: agent
        hostname: "{{ inventory_hostname }}"
        ports:
          - "7007:7007"
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
        log_driver: json-file
        log_options:
          max-size: "10m"
          max-file: "5"

    # ─── Output ───────────────────────────────────────────────────────────────

    - name: Read SSL certificate
      slurp:
        src: /var/lib/pg-node/certs/ssl_cert.pem
      register: ssl_cert

    - name: Print setup summary
      debug:
        msg:
          - "══════════════════════════════════════════"
          - "PASARGUARD NODE READY — {{ inventory_hostname }}"
          - "══════════════════════════════════════════"
          - "Node address  : {{ ansible_host }}"
          - "Service port  : {{ service_port }}"
          - "Protocol      : {{ service_protocol }}"
          - "══════════════════════════════════════════"
          - "SSL CERTIFICATE:"
          - "{{ ssl_cert.content | b64decode }}"
          - "══════════════════════════════════════════"