---
- name: Setup Caddy stub site on node
  hosts: pasarguard_nodes
  become: true
  vars:
    pg_node_dir: "/opt/pg-node"
    pg_node_caddy_dir: "{{ pg_node_dir }}/caddy"

  tasks:

    # ─── Directories ─────────────────────────────────────────────────────────

    - name: Create Caddy config directory
      file:
        path: "{{ pg_node_caddy_dir }}"
        state: directory
        mode: "0755"

    - name: Create Caddy srv directory
      file:
        path: "{{ pg_node_caddy_dir }}/srv"
        state: directory
        mode: "0755"

    # ─── Files ─────────────────────────────────────────────────────────────────

    - name: Copy stub site index.html
      copy:
        src: files/node-frontend/index.html
        dest: "{{ pg_node_caddy_dir }}/srv/index.html"
        mode: "0644"

    - name: Render Caddyfile
      template:
        src: templates/caddy-stub/Caddyfile.j2
        dest: "{{ pg_node_caddy_dir }}/Caddyfile"
        mode: "0644"

    - name: Render docker-compose.yml with Caddy
      template:
        src: templates/docker-compose-pg-node.yml.j2
        dest: "{{ pg_node_dir }}/docker-compose.yml"
        mode: "0644"

    # ─── Firewall ────────────────────────────────────────────────────────────

    - name: Allow HTTP port for Caddy ACME
      ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow Caddy stub port
      ufw:
        rule: allow
        port: "{{ caddy_stub_port }}"
        proto: tcp

    # ─── Start services ──────────────────────────────────────────────────────

    - name: Start node and caddy
      shell: docker compose up -d
      args:
        chdir: "{{ pg_node_dir }}"

    # ─── Output ─────────────────────────────────────────────────────────────

    - name: Print setup summary
      debug:
        msg:
          - "══════════════════════════════════════════"
          - "CADDY STUB READY — {{ inventory_hostname }}"
          - "══════════════════════════════════════════"
          - "Domain        : {{ caddy_stub_domain }}"
          - "Port          : {{ caddy_stub_port }}"
          - "Config path   : {{ pg_node_caddy_dir }}/Caddyfile"
          - "Compose path  : {{ pg_node_dir }}/docker-compose.yml"
          - "Site path     : {{ pg_node_caddy_dir }}/srv/index.html"
          - "══════════════════════════════════════════"
